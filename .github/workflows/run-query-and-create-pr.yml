name: Run Query and Create PR

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC every night
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-query:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      
      - name: Get R library path
        id: r-lib
        run: |
          echo "path=$(Rscript -e 'cat(.libPaths()[1])')" >> $GITHUB_OUTPUT
      
      - name: Setup R dependencies cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.r-lib.outputs.path }}
          key: ${{ runner.os }}-r-${{ hashFiles('src/build_run_query.R', 'tests/test-list_downloads.R') }}
          restore-keys: |
            ${{ runner.os }}-r-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libudunits2-dev libgdal-dev gdal-bin libpng-dev
      
      - name: Install R dependencies
        env: 
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c('dplyr', 'glue', 'here', 'mregions2', 'readr', 'rgbif', 'remotes', 'testthat'))
          remotes::install_github('trias-project/trias')
          remotes::install_github('guardias-eu/reasin')
        shell: Rscript {0}
      
      - name: Run get_large_marine_regions.R
        run: Rscript src/get_large_marine_regions.R

      - name: Test area WKT
        id: test_area_wkt
        run: |
          Rscript -e "
          results <- testthat::test_file('tests/test-area_wkt.R')
          df <- as.data.frame(results)
          if (sum(df[['failed']]) > 0) {
            quit(status = 1)
          }
          "
          echo "area_tests_passed=true" >> $GITHUB_OUTPUT
          echo "Tests passed"
        continue-on-error: true

      - name: Create issue on area test failure
        if: steps.test_area_wkt.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Area WKT tests failed in automated workflow',
              body: `The area WKT validation tests failed during the automated workflow run.\n\n**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease review the test failures in \`tests/test-area_wkt.R\` and the output from \`src/get_large_marine_regions.R\`.`,
              labels: ['bug', 'automated']
            });

      - name: Run build_run_query.R
        if: steps.test_area_wkt.outputs.area_tests_passed == 'true'
        env:
          GBIF_USER: ${{ secrets.GBIF_USER }}
          GBIF_PWD: ${{ secrets.GBIF_PWD }}
          GBIF_EMAIL: ${{ secrets.GBIF_EMAIL }}
        run: Rscript src/build_run_query.R
      
      - name: Check for changes
        if: steps.test_area_wkt.outputs.area_tests_passed == 'true'
        id: check_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi
      
      - name: Create branch and commit changes
        if: steps.test_area_wkt.outputs.area_tests_passed == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: create_branch
        run: |
          BRANCH_NAME="automated-query-update-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "Automated update from build_run_query.R"
          git push origin "$BRANCH_NAME"
      
      - name: Create Pull Request
        if: steps.test_area_wkt.outputs.area_tests_passed == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: create_pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Automated query update',
              head: '${{ steps.create_branch.outputs.branch_name }}',
              base: 'main',
              body: 'This PR was automatically created by the nightly (or event dispatch) query run.\n\nGenerated from `build_run_query.R`.'
            });
            
            // Add automated label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automated']
            });
            
            core.setOutput('pr_number', pr.number);
            return pr.number;
      
      - name: Run tests downloads
        if: steps.test_area_wkt.outputs.area_tests_passed == 'true' && steps.check_changes.outputs.has_changes == 'true'
        id: run_tests
        run: |
          Rscript -e "
          results <- testthat::test_file('tests/test-list_downloads.R')
          df <- as.data.frame(results)
          if (sum(df[['failed']]) > 0) {
            quit(status = 1)
          }
          "
          echo "tests_passed=true" >> $GITHUB_OUTPUT
          echo "Download tests passed"
        continue-on-error: true
      
      - name: Add approved label if tests passed
        if: steps.check_changes.outputs.has_changes == 'true' && steps.run_tests.outputs.tests_passed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_pr.outputs.result }},
              labels: ['approved']
            });
      
      - name: Create issue on download list test failure
        if: steps.check_changes.outputs.has_changes == 'true' && steps.run_tests.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.create_pr.outputs.result }};
            const branchName = '${{ steps.create_branch.outputs.branch_name }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Download list tests failed in automated workflow',
              body: `The download list validation tests failed during the automated workflow run.\n\n**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Pull Request:** #${prNumber}\n\n**Files to review:**\n- [tests/test-list_downloads.R](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${branchName}/tests/test-list_downloads.R)\n- [data/output/list_downloads.tsv](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${branchName}/data/output/list_downloads.tsv)\n\nPlease review the test failures and the download metadata in the PR branch.`,
              labels: ['bug', 'automated']
            });
